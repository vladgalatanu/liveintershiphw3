<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        Log Application - Internship Tracker
    </title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
     <img src="profile.jpg" alt="Photo of me">
     <h1>
        Vlad Galatanu - Career Dashboard
    </h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="data.html">Tracker</a></li>
            <li><a href="contact.html">Log</a></li>
            <li><a href="card.html">Card</a></li>
            <li><a href="overview.html">Overview</a></li>
            <li><a href="chatbot.html">Chat</a></li>
            <li><a href="portfolio.html">Portfolio</a></li>
        </ul>
    </nav>

    <main id="main">
        <section>
            <h2>
                Application Entry Form
            </h2>
            <form action="#" method="post">
                <fieldset>
                    <legend>New Application Details</legend>
                    <div>
                         <label for="applicationStatus">Current Status:</label>
                         <select id="applicationStatus" name="applicationStatus" required>
                             <option value="" disabled selected>Select a status...</option>
                             <option value="applied">Applied</option>
                             <option value="under_review">Under Review</option>
                             <option value="interview">Interview Scheduled</option>
                             <option value="denied">Denied</option>
                             <option value="accepted">Accepted</option>
                         </select>
                    </div>

                    <div>
                        <label for="applicantName">Company:</label>
                        <input type="text" id="applicantName" name="applicantName" required>
                    </div>

                    <div>
                        <label for="contactEmail">Role:</label>
                        <input type="email" id="contactEmail" name="contactEmail" required>
                    </div>

                    <div>
                        <label for="companySubject">Date Applied:</label>
                        <input type="text" id="companySubject" name="companySubject" required>
                    </div>

                    <div>
                        <label for="applicationNotes">Application Notes / Message:</label>
                        <textarea id="applicationNotes" name="applicationNotes" rows="5" required></textarea>
                    </div>

                    <div>
                        <input type="submit" value="Save Application">
                    </div>
                </fieldset>
            </form>
        </section>
    </main>

    <footer>
        <p>
            2026 Vlad Galatanu - Internship & Jobs Dashboard
        </p>
    </footer>
</body>
</html>
